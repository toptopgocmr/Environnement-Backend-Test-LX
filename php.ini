; ── LireX PHP configuration ─────────────────────────────────────────
; Limites d'upload alignées sur les standards des grandes plateformes
; Amazon KDP: 650 Mo | Apple Books: 2 Go | Kobo: 1 Go
; LireX choisit 500 Mo comme limite raisonnable pour la plateforme.
;
; Pour activer ce fichier :
;   php -c php.ini artisan serve       (développement)
;   ou pointer php-fpm vers ce fichier (production)

upload_max_filesize = 512M
post_max_size       = 520M
max_execution_time  = 300
max_input_time      = 300
memory_limit        = 512M
