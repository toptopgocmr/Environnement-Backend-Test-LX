<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <!-- White/cream background -->
  <rect width="400" height="600" fill="#f2ecd8"/>
  <!-- Top section: ornamental border (Gallimard style) -->
  <rect x="0" y="0" width="400" height="20" fill="#1a2a5a"/>
  <rect x="0" y="20" width="400" height="8" fill="#8a1010"/>
  <rect x="0" y="28" width="400" height="4" fill="#1a2a5a"/>
  <!-- Thin decorative lines -->
  <rect x="30" y="50" width="340" height="1.5" fill="#1a2a5a"/>
  <rect x="30" y="58" width="340" height="0.5" fill="#1a2a5a"/>
  <!-- Author - TCHICAYA U TAM'SI -->
  <text x="200" y="95" font-family="Georgia, serif" font-size="18" font-weight="bold"
        fill="#1a1a1a" text-anchor="middle" letter-spacing="4">TCHICAYA U TAM'SI</text>
  <!-- Thin lines after author -->
  <rect x="30" y="108" width="340" height="0.5" fill="#1a2a5a"/>
  <rect x="30" y="115" width="340" height="1.5" fill="#1a2a5a"/>
  <!-- Main title -->
  <text x="200" y="175" font-family="Georgia, serif" font-size="26" font-weight="bold"
        fill="#1a1a1a" text-anchor="middle">CES FRUITS SI DOUX</text>
  <text x="200" y="210" font-family="Georgia, serif" font-size="26" font-weight="bold"
        fill="#1a1a1a" text-anchor="middle">DE L'ARBRE À PAIN</text>
  <!-- Genre subtitle -->
  <text x="200" y="248" font-family="Georgia, serif" font-size="15" font-style="italic"
        fill="#3a3a3a" text-anchor="middle">Roman</text>
  <!-- Separator -->
  <rect x="30" y="265" width="340" height="1" fill="#1a2a5a"/>
  <!-- Second title in collection -->
  <text x="200" y="305" font-family="Georgia, serif" font-size="18" font-weight="bold"
        fill="#1a1a1a" text-anchor="middle">LA MAIN SÈCHE</text>
  <text x="200" y="330" font-family="Georgia, serif" font-size="13" font-style="italic"
        fill="#3a3a3a" text-anchor="middle">Nouvelles</text>
  <rect x="30" y="348" width="340" height="0.5" fill="#1a2a5a"/>
  <!-- Third title -->
  <text x="200" y="382" font-family="Georgia, serif" font-size="18" font-weight="bold"
        fill="#1a1a1a" text-anchor="middle">LÉGENDES AFRICAINES</text>
  <text x="200" y="407" font-family="Georgia, serif" font-size="13" font-style="italic"
        fill="#3a3a3a" text-anchor="middle">Contes</text>
  <!-- OEuvres complètes -->
  <rect x="30" y="425" width="340" height="1" fill="#1a2a5a"/>
  <text x="200" y="452" font-family="Georgia, serif" font-size="13"
        fill="#3a3a3a" text-anchor="middle">Œuvres Complètes, III</text>
  <!-- Bottom blue band -->
  <rect x="0" y="480" width="400" height="120" fill="#1a2a5a"/>
  <!-- Large TCHICAYA in white -->
  <text x="200" y="555" font-family="Georgia, serif" font-size="52" font-weight="bold"
        fill="white" text-anchor="middle" letter-spacing="2">TCHICAYA</text>
  <!-- Continents Noirs / Gallimard -->
  <rect x="0" y="472" width="400" height="8" fill="#8a1010"/>
  <text x="200" y="592" font-family="Arial, sans-serif" font-size="12"
        fill="rgba(255,255,255,0.8)" text-anchor="middle">Continents noirs • Gallimard</text>
</svg>