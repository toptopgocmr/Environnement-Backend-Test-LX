<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <rect width="400" height="600" fill="#4a8c28"/>
  <!-- Wax pattern circles in background -->
  <circle cx="80" cy="80" r="55" fill="none" stroke="#3a7018" stroke-width="3" opacity="0.5"/>
  <circle cx="80" cy="80" r="40" fill="none" stroke="#3a7018" stroke-width="2" opacity="0.4"/>
  <circle cx="320" cy="120" r="65" fill="none" stroke="#3a7018" stroke-width="3" opacity="0.5"/>
  <circle cx="320" cy="120" r="48" fill="none" stroke="#3a7018" stroke-width="2" opacity="0.4"/>
  <circle cx="50" cy="320" r="70" fill="none" stroke="#3a7018" stroke-width="3" opacity="0.5"/>
  <circle cx="350" cy="400" r="60" fill="none" stroke="#3a7018" stroke-width="3" opacity="0.5"/>
  <circle cx="200" cy="500" r="80" fill="none" stroke="#3a7018" stroke-width="3" opacity="0.4"/>
  <!-- Stylized hand holding glass -->
  <g transform="translate(200,280) scale(1)">
    <!-- Arm -->
    <rect x="-35" y="80" width="70" height="120" rx="20" fill="#1a0a0a"/>
    <!-- Wax pattern on arm -->
    <circle cx="-15" cy="110" r="8" fill="none" stroke="#e8a020" stroke-width="2"/>
    <circle cx="10" cy="130" r="8" fill="none" stroke="#e8a020" stroke-width="2"/>
    <circle cx="-15" cy="150" r="8" fill="none" stroke="#e8a020" stroke-width="2"/>
    <circle cx="10" cy="170" r="8" fill="none" stroke="#e8a020" stroke-width="2"/>
    <!-- Red sleeve -->
    <rect x="-45" y="160" width="90" height="40" rx="10" fill="#c02010"/>
    <!-- Hand -->
    <ellipse cx="0" cy="60" rx="42" ry="50" fill="#2a1505"/>
    <!-- Chain bracelet -->
    <path d="M -42 90 Q 0 75 42 90" fill="none" stroke="#f0c020" stroke-width="6"/>
    <path d="M -42 98 Q 0 83 42 98" fill="none" stroke="#f0c020" stroke-width="4"/>
    <!-- Glass -->
    <rect x="-22" y="-60" width="44" height="70" rx="4" fill="#d4f080" opacity="0.85"/>
    <rect x="-18" y="-56" width="36" height="50" rx="2" fill="#a8d840" opacity="0.7"/>
    <!-- Liquid -->
    <rect x="-18" y="-20" width="36" height="34" rx="2" fill="#e8c040" opacity="0.9"/>
    <!-- Glass stem -->
    <rect x="-8" y="10" width="16" height="16" fill="#d4f080" opacity="0.85"/>
    <!-- Fingers -->
    <rect x="-45" y="20" width="12" height="55" rx="6" fill="#2a1505"/>
    <rect x="-32" y="10" width="12" height="62" rx="6" fill="#2a1505"/>
    <rect x="20" y="10" width="12" height="62" rx="6" fill="#2a1505"/>
    <rect x="33" y="18" width="11" height="55" rx="6" fill="#2a1505"/>
  </g>
  <!-- White Points badge top right -->
  <rect x="340" y="0" width="60" height="42" fill="white"/>
  <text x="370" y="16" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
        fill="#1a1a1a" text-anchor="middle">POINTS</text>
  <!-- Title -->
  <text x="200" y="495" font-family="Arial Black, sans-serif" font-size="62" font-weight="900"
        fill="#f0c020" text-anchor="middle" letter-spacing="-1">VERRE</text>
  <text x="200" y="545" font-family="Arial Black, sans-serif" font-size="62" font-weight="900"
        fill="#e83040" text-anchor="middle" letter-spacing="-1">CASSÉ</text>
  <!-- Author -->
  <text x="200" y="580" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
        fill="white" text-anchor="middle" letter-spacing="2">ALAIN MABANCKOU</text>
</svg>