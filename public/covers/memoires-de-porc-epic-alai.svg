<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <rect width="400" height="600" fill="#d42010"/>
  <!-- Silhouette tête afro -->
  <ellipse cx="290" cy="140" rx="90" ry="110" fill="#1a0a00"/>
  <ellipse cx="250" cy="160" rx="70" ry="90" fill="#1a0a00"/>
  <!-- Cheveux zigzag/motif -->
  <path d="M220,60 Q235,40 250,60 Q265,40 280,60 Q295,40 310,60 Q325,40 340,60 Q355,40 370,55 Q365,80 350,90 Q335,70 320,90 Q305,70 290,90 Q275,70 260,90 Q245,70 230,90 Q215,70 200,82" 
        fill="#2a1505" stroke="#2a1505" stroke-width="3"/>
  <!-- White Points badge -->
  <rect x="340" y="0" width="60" height="42" fill="white"/>
  <text x="370" y="16" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
        fill="#1a1a1a" text-anchor="middle">POINTS</text>
  <!-- MÉMOIRES colorful letters -->
  <text x="30" y="280" font-family="Arial Black, sans-serif" font-size="54" font-weight="900">
    <tspan fill="#e8c030">M</tspan><tspan fill="white">É</tspan><tspan fill="#40b840">M</tspan><tspan fill="#e84020">O</tspan><tspan fill="white">I</tspan><tspan fill="#e8c030">R</tspan><tspan fill="#40b840">E</tspan><tspan fill="white">S</tspan>
  </text>
  <text x="200" y="345" font-family="Arial Black, sans-serif" font-size="54" font-weight="900"
        fill="white" text-anchor="middle">DE</text>
  <text x="30" y="410" font-family="Arial Black, sans-serif" font-size="46" font-weight="900">
    <tspan fill="#40b840">P</tspan><tspan fill="white">O</tspan><tspan fill="#e8c030">R</tspan><tspan fill="#e84020">C</tspan><tspan fill="white">-</tspan>
  </text>
  <text x="30" y="460" font-family="Arial Black, sans-serif" font-size="52" font-weight="900">
    <tspan fill="white">É</tspan><tspan fill="#40b840">P</tspan><tspan fill="#e8c030">I</tspan><tspan fill="white">C</tspan>
  </text>
  <!-- Author -->
  <text x="200" y="540" font-family="Arial, sans-serif" font-size="18" font-weight="bold"
        fill="white" text-anchor="middle" letter-spacing="1">ALAIN MABANCKOU</text>
  <text x="200" y="570" font-family="Arial, sans-serif" font-size="13"
        fill="rgba(255,255,255,0.7)" text-anchor="middle">Prix Renaudot 2006</text>
</svg>